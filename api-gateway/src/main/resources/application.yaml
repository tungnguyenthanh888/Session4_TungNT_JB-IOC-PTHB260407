spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: customer-service-routes
              uri: lb:\\customer-service
              predicates:
                - Path=/api/v1/customer/**
              filters:
                - RewritePath=/api/v1/customer/(?<segment>.*), /customer-api/$\{segment}
                - AddResponseHeader=X-System-Name, Api-Gateway-System
server:
  port: 8080

eureka:
  client:
    service-url:
      default: http://localhost:8761/eureka/
    fetch-registry: true
    register-with-eureka: true
