spring:
  application:
    name: order-service
  datasource:
    password: 123456
    url: jdbc:postgresql://localhost:5432/order_db
    username: postgres
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true
  cloud:
    discovery:
      enabled: true
eureka:
  client:
    service-url:
      default: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    # 5 secs send heart beat
    lease-renewal-interval-in-seconds: 5
    # 10secs waiting before delete from eureka server
    lease-expiration-duration-in-seconds: 10
server:
  port: 8084
